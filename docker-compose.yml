# 1. Project name lazmi dein
name: awa_products_v1

services:
  db:
    image: postgres:16-alpine
    container_name: awa_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: awaproducts_db
    ports:
      - "5433:5432"
    volumes:
      # 2. Volume ka naam unique rakhein
      - awa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: awa_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:admin@db:5432/awaproducts_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/website/awa_products
      dockerfile: Dockerfile
      target: dev
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: awa_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/website/awa_products:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

# 3. Yahan bhi volume ka naam change karein
volumes:
  awa_postgres_data: